services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: 127.0.0.1
      DB_POSTGRESDB_PORT: 5433
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-n8npassword}
      N8N_CUSTOM_EXTENSIONS: /home/node/custom
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY must be set}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      NODE_OPTIONS: "--experimental-strip-types"
      BAMBUSER_API_BASE_URL: ${BAMBUSER_API_BASE_URL:-}
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-debug}
    volumes:
      - n8n_data:/home/node/.n8n
      # Mount source live so saves on the host are immediately visible inside the container.
      # --watch then detects the change and restarts n8n automatically.
      - ./nodes/dist:/home/node/custom/n8n-nodes-bambuser
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-n8npassword}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  n8n_data:
  postgres_data:
